name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/mcp-memory
            git pull --ff-only
            cp mcp-memory.service /etc/systemd/system/mcp-memory.service
            systemctl daemon-reload
            systemctl restart mcp-memory
